services:
  - type: web
    name: ai-widget-saas
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://ai-widget-saas-fawn.vercel.app
    autoDeploy: true
